<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}教师中心 - 在线考试系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);
            color: white;
        }
        .sidebar a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            transition: all 0.3s;
        }
        .sidebar a:hover {
            color: white;
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }
        .sidebar a.active {
            color: white;
            background: rgba(255,255,255,0.2);
            border-left: 4px solid white;
        }
        .sidebar .nav-icon {
            margin-right: 10px;
        }
        .stat-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .hover-shadow:hover {
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        a.text-decoration-none {
            display: block;
        }
        .content-wrapper {
            background-color: #f8f9fa;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 p-0 sidebar">
                <div class="p-3">
                    <h4 class="text-center mb-4">📚 教师中心</h4>
                    <hr style="border-color: rgba(255,255,255,0.2);">
                    <a href="{% url 'teachers:dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                        <i class="bi bi-house-door nav-icon"></i> 主页
                    </a>
                    <a href="{% url 'admin:teachers_question_changelist' %}">
                        <i class="bi bi-question-circle nav-icon"></i> 题库管理
                    </a>
                    <a href="{% url 'admin:exams_exam_changelist' %}">
                        <i class="bi bi-pencil-square nav-icon"></i> 考试管理
                    </a>
                    <a href="{% url 'teachers:ongoing_exams' %}" class="{% if request.resolver_match.url_name == 'ongoing_exams' %}active{% endif %}">
                        <i class="bi bi-play-circle nav-icon"></i> 进行中考试
                    </a>
                    <a href="{% url 'teachers:pending_list' %}" class="{% if request.resolver_match.url_name == 'pending_list' %}active{% endif %}">
                        <i class="bi bi-check-circle nav-icon"></i> 待批改试卷
                    </a>
                    <hr style="border-color: rgba(255,255,255,0.2);">
                    <a href="/">
                        <i class="bi bi-box-arrow-left nav-icon"></i> 返回首页
                    </a>
                    <a href="{% url 'logout' %}">
                        <i class="bi bi-power nav-icon"></i> 退出登录
                    </a>
                </div>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-10 p-4 content-wrapper">
                {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endfor %}
                {% endif %}

                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
