<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>欢迎页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
        }
        .btn-primary { background: #667eea; }
        .btn-secondary { background: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 登录成功！</h1>

        <div class="user-info">
            <p><strong>用户名:</strong> {{ user.username }}</p>
            <p><strong>角色:</strong> {{ role }}</p>
            <p><strong>上次登录:</strong> {{ user.last_login|default:'首次登录' }}</p>
        </div>

        <div>
            <a href="/admin/" class="btn btn-primary">管理后台</a>
            <a href="/logout/" class="btn btn-secondary"
               onclick="return confirm('确定要退出登录吗？')">退出登录</a>
        </div>

        <p style="color: #666; margin-top: 20px; font-size: 14px;">
            提示：学生主页正在开发中
        </p>
    </div>
</body>
</html>
