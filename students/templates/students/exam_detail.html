<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考试详情 - 在线考试系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'students:dashboard' %}">📝 在线考试系统</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">📋 考试详情</h4>
            </div>
            <div class="card-body">
                <h3>{{ exam.title }}</h3>
                <p class="text-muted">{{ exam.description }}</p>
                <hr>

                <div class="row">
                    <div class="col-md-6">
                        <p><strong>开始时间：</strong> {{ exam.start_time|date:'Y-m-d H:i' }}</p>
                        <p><strong>结束时间：</strong> {{ exam.end_time|date:'Y-m-d H:i' }}</p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>考试时长：</strong> {{ exam.duration }} 分钟</p>
                        <p><strong>题目数量：</strong> {{ question_count }} 题</p>
                        <p><strong>总分：</strong> {{ exam.total_score }}</p>
                    </div>
                </div>

                <div class="alert alert-info mt-3">
                    ⏰ 请认真阅读考试规则，点击开始考试后计时开始，中途退出将自动保存答案。
                </div>

                <div class="text-center mt-4">
                    <a href="{% url 'students:exam_taking' exam.id %}" class="btn btn-success btn-lg">开始考试</a>
                    <a href="{% url 'students:dashboard' %}" class="btn btn-secondary btn-lg ms-2">返回主页</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
