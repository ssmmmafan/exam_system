<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交确认 - 在线考试系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'students:dashboard' %}">📝 在线考试系统</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-warning">
                <h4 class="mb-0">⚠️ 确认提交</h4>
            </div>
            <div class="card-body text-center">
                <h5>{{ exam.title }}</h5>
                <p class="mt-4">你确定要提交试卷吗？</p>
                <p class="text-danger">⚠️ 提交后将无法修改答案！</p>

                <div class="mt-4">
                    <form method="post" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-success btn-lg">确认提交</button>
                    </form>
                    <a href="{% url 'students:exam_taking' exam.id %}" class="btn btn-secondary btn-lg">返回继续答题</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
