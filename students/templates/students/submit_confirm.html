{% extends "students/base_student.html" %}

{% block title %}提交确认{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header bg-warning">
        <h4 class="mb-0">⚠️ 确认提交</h4>
    </div>
    <div class="card-body text-center">
        <h5>{{ exam.title }}</h5>
        <p class="mt-4">你确定要提交试卷吗？</p>
        <p class="text-danger">⚠️ 提交后将无法修改答案！</p>

        <div class="mt-4">
            <form method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-success btn-lg">确认提交</button>
            </form>
            <a href="{% url 'students:exam_taking' exam.id %}" class="btn btn-secondary btn-lg">返回继续答题</a>
        </div>
    </div>
</div>
{% endblock %}
