<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}在线考试系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand {
            font-weight: 600;
        }
        .nav-link {
            font-size: 15px;
        }
        .user-info {
            cursor: default;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'students:dashboard' %}">📝 在线考试系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <!-- 用户名显示 -->
                    <li class="nav-item">
                        <span class="nav-link user-info text-white">
                            👤 {{ request.user.username }}
                        </span>
                    </li>

                    <!-- 学生主页（当前所在） -->
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'students:dashboard' %}">🏠 主页</a>
                    </li>

                    <!-- 管理员专属：后台管理入口 -->
                    {% if request.user.is_staff %}
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">⚙️ 管理后台</a>
                    </li>
                    {% endif %}

                    <!-- 退出登录 -->
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'logout' %}">🚪 退出</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 消息提示 -->
    <div class="container mt-3">
        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        {% endif %}
    </div>

    <!-- 主要内容区 -->
    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
